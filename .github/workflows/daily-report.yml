name: 每日宏觀資訊報告（數據收集）

on:
  schedule:
    # 台北時間 06:30 = UTC 22:30（前一天），週一到週五
    - cron: '30 22 * * 0-4'
  workflow_dispatch:

env:
  TZ: Asia/Taipei
  POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
  FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

permissions:
  contents: write

jobs:
  collect-and-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install yfinance requests beautifulsoup4 exchange_calendars numpy pandas

      - name: Collect market data
        run: |
          python3 -c "
          import sys, json
          sys.path.insert(0, '.')
          from modules.market_data import get_asia_indices, get_europe_indices, get_us_indices, get_commodities, get_forex, get_bonds, get_crypto
          data = {
              'asia_indices': get_asia_indices(),
              'europe_indices': get_europe_indices(),
              'us_indices': get_us_indices(),
              'commodities': get_commodities(),
              'forex': get_forex(),
              'bonds': get_bonds(),
              'crypto': get_crypto(),
          }
          with open('reports/market_data_today.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2, default=str)
          print(f'Market data: {sum(len(v) for v in data.values())} items')
          "

      - name: Collect news
        run: |
          python3 -c "
          import sys, json
          sys.path.insert(0, '.')
          from modules.news_collector import get_news_for_date
          news = get_news_for_date()
          with open('reports/news_today.json', 'w', encoding='utf-8') as f:
              json.dump(news, f, ensure_ascii=False, indent=2, default=str)
          print(f'News: {len(news[\"articles\"])} articles')
          "

      - name: Scan hot stocks
        timeout-minutes: 15
        run: |
          python3 -c "
          import sys, json
          sys.path.insert(0, '.')
          from modules.hot_stocks import get_all_hot_stocks
          with open('reports/news_today.json') as f:
              news = json.load(f)
          hot = get_all_hot_stocks(news_trending_tickers=news.get('trending_tickers', []))
          with open('reports/hot_stocks_today.json', 'w', encoding='utf-8') as f:
              json.dump(hot, f, ensure_ascii=False, indent=2, default=str)
          total = sum(len(d.get('inflow',[])) + len(d.get('outflow',[])) for d in hot.values())
          print(f'Hot stocks: {total}')
          "

      - name: Collect enhanced data
        run: |
          python3 -c "
          import sys, json
          sys.path.insert(0, '.')
          from modules.sentiment_data import collect_all_enhanced_data
          from modules.enhanced_market_data import collect_all_enhanced_v2
          v1 = collect_all_enhanced_data()
          v2 = collect_all_enhanced_v2()
          with open('reports/enhanced_today.json', 'w', encoding='utf-8') as f:
              json.dump(v1, f, ensure_ascii=False, indent=2, default=str)
          with open('reports/enhanced_v2_today.json', 'w', encoding='utf-8') as f:
              json.dump(v2, f, ensure_ascii=False, indent=2, default=str)
          print('Enhanced data collected')
          "

      - name: Collect FRED economic data
        run: |
          python3 -c "
          import sys, json
          sys.path.insert(0, '.')
          from modules.fred_data import collect_fred_data
          data = collect_fred_data()
          with open('reports/fred_today.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2, default=str)
          meta = data.get('metadata', {})
          print(f'FRED data: {meta.get(\"series_fetched\",0)}/{meta.get(\"series_total\",0)} series')
          "

      - name: Collect alternative data
        run: |
          python3 -c "
          import sys, json
          sys.path.insert(0, '.')
          from modules.alternative_data import collect_alternative_data
          data = collect_alternative_data()
          with open('reports/alternative_today.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2, default=str)
          print('Alternative data collected')
          "

      - name: Validate all data
        run: |
          python3 -c "
          import json, sys, os
          from datetime import datetime

          DATE = datetime.now().strftime('%Y-%m-%d')
          errors = []
          warnings = []

          def check_json(path, name, min_keys=1):
              if not os.path.exists(path):
                  errors.append(f'MISSING: {name} ({path})')
                  return None
              try:
                  with open(path) as f:
                      data = json.load(f)
                  if isinstance(data, dict) and len(data) < min_keys:
                      warnings.append(f'SPARSE: {name} only {len(data)} keys')
                  size = os.path.getsize(path)
                  print(f'  ✓ {name}: {size:,} bytes')
                  return data
              except Exception as e:
                  errors.append(f'CORRUPT: {name} - {e}')
                  return None

          print('=== 數據驗證開始 ===')
          print(f'日期: {DATE}')
          print()

          # 1. 市場數據
          md = check_json('reports/market_data_today.json', '市場數據', 5)
          if md:
              for key in ['asia_indices','us_indices','commodities','forex','bonds','crypto']:
                  items = md.get(key, {})
                  if len(items) == 0:
                      warnings.append(f'市場數據 {key} 為空')
                  else:
                      print(f'    {key}: {len(items)} items')

          # 2. 新聞
          news = check_json('reports/news_today.json', '新聞')
          if news:
              articles = news.get('articles', [])
              if len(articles) < 10:
                  warnings.append(f'新聞只有 {len(articles)} 篇（正常 100+）')
              else:
                  print(f'    articles: {len(articles)}')

          # 3. 熱門股
          hot = check_json('reports/hot_stocks_today.json', '熱門股')
          if hot:
              for market, data in hot.items():
                  inf = len(data.get('inflow', []))
                  out = len(data.get('outflow', []))
                  print(f'    {market}: inflow {inf}, outflow {out}')
                  if market == '美股' and inf == 0 and out == 0:
                      warnings.append('美股熱門股全空（fallback 可能失效）')

          # 4. 情緒數據
          enh = check_json('reports/enhanced_today.json', '情緒數據')
          if enh:
              fg = enh.get('sentiment', {}).get('fear_greed', {})
              if 'error' in fg:
                  warnings.append(f'Fear/Greed 取得失敗: {fg[\"error\"]}')
              elif fg.get('score') is not None:
                  print(f'    Fear/Greed: {fg[\"score\"]:.1f} ({fg.get(\"rating\",\"\")})')
              vix = enh.get('sentiment', {}).get('vix', {})
              if vix.get('value'):
                  print(f'    VIX: {vix[\"value\"]:.2f}')

          # 5. 技術面
          check_json('reports/enhanced_v2_today.json', '技術面/信用利差')

          # 6. FRED
          fred = check_json('reports/fred_today.json', 'FRED經濟數據')
          if fred:
              meta = fred.get('metadata', {})
              fetched = meta.get('series_fetched', 0)
              total = meta.get('series_total', 0)
              print(f'    FRED: {fetched}/{total} series')
              if fetched < total * 0.5:
                  warnings.append(f'FRED 只取得 {fetched}/{total} 系列')

          # 7. 替代數據
          alt = check_json('reports/alternative_today.json', '替代數據')
          if alt:
              for key in ['put_call_ratio','sector_rotation','volatility_term_structure','em_currency_stress','market_breadth']:
                  if key in alt and 'error' not in alt[key]:
                      print(f'    {key}: OK')
                  elif key in alt:
                      warnings.append(f'替代數據 {key} 有錯誤')

          # 結果
          print()
          print('=== 驗證結果 ===')
          if errors:
              print(f'❌ 嚴重錯誤 ({len(errors)}):')
              for e in errors:
                  print(f'   {e}')
              sys.exit(1)
          if warnings:
              print(f'⚠️  警告 ({len(warnings)}):')
              for w in warnings:
                  print(f'   {w}')
          print(f'✅ 驗證通過 — {7 - len(errors)} 個數據源正常')
          "

      - name: Commit validated data to repo
        run: |
          DATE=$(TZ='Asia/Taipei' date +%Y-%m-%d)
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add reports/market_data_today.json reports/news_today.json reports/hot_stocks_today.json reports/enhanced_today.json reports/enhanced_v2_today.json reports/fred_today.json reports/alternative_today.json
          git commit -m "data: ${DATE} 數據收集+驗證通過 ✅" || echo "No changes to commit"
          git push origin master
